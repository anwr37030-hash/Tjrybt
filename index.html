<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الملابس التجريبي</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>متجري الصغير 👕</h1>
    </header>

    <section class="admin-panel">
        <h3>لوحة التحكم (إضافة منتج جديد)</h3>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="text" id="pImg" placeholder="رابط الصورة (من Storage)">
        <button onclick="addProduct()">إضافة المنتج للمتجر</button>
    </section>

    <hr>

    <div id="products-list" class="products-grid">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
